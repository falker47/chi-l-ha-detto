name: Keep Supabase Alive

# Supabase free tier mette in pausa progetti inattivi dopo 7 giorni.
# Questo workflow pinga il DB ogni 3 giorni per mantenerlo sveglio.

on:
  schedule:
    # At 09:00 UTC every 3 days
    - cron: '0 9 */3 * *'
  workflow_dispatch: # permette trigger manuale dalla UI Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Query leaderboard
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          RESPONSE=$(curl -s -o response.json -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/leaderboard?select=id&limit=1" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}")
          echo "HTTP $RESPONSE"
          cat response.json
          if [ "$RESPONSE" != "200" ]; then
            echo "::error::Supabase ping failed with status $RESPONSE"
            exit 1
          fi
